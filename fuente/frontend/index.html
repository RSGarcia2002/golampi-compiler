<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Golampi Compiler</title>
  <link rel="stylesheet" href="./estilos.css" />
</head>
<body>
  <main class="contenedor">
    <header class="encabezado">
      <h1>Golampi Compiler</h1>
      <div class="toolbar">
        <button id="btn-nuevo" type="button" class="btn btn-azul">Nuevo</button>
        <button id="btn-cargar" type="button" class="btn">Cargar</button>
        <button id="btn-guardar" type="button" class="btn">Guardar</button>
        <button id="btn-compilar" type="button" class="btn btn-verde">Compilar</button>
        <button id="btn-limpiar" type="button" class="btn btn-rojo">Limpiar Consola</button>
      </div>
    </header>

    <section class="layout">
      <article class="panel principal">
        <h2>Editor de Código - Golampi</h2>
        <textarea id="editor" spellcheck="false">func main() {
  a := 1
  b := a + 2
  println(b)
}</textarea>

        <h2>Consola - Código ARM64 Generado</h2>
        <pre id="consola">Compila para ver el código ARM64 generado...</pre>
      </article>

      <aside class="panel lateral">
        <h2>Reportes</h2>
        <p id="resumen">Sin análisis ejecutado.</p>
        <div class="acciones-lateral">
          <button id="btn-ver-errores" type="button" class="btn btn-alerta">Ver Errores</button>
          <button id="btn-ver-tabla" type="button" class="btn btn-ambar">Ver Tabla de Símbolos</button>
          <button id="btn-descargar-asm" type="button" class="btn btn-cian">Descargar ARM64</button>
        </div>
      </aside>
    </section>
  </main>

  <input id="input-cargar-archivo" type="file" accept=".gol,.txt" hidden />

  <dialog id="modal-errores" class="modal">
    <h3>Errores</h3>
    <pre id="contenido-errores">Sin datos.</pre>
    <button id="btn-cerrar-errores" type="button" class="btn">Cerrar</button>
  </dialog>

  <dialog id="modal-tabla" class="modal">
    <h3>Tabla de Símbolos</h3>
    <pre id="contenido-tabla">Sin datos.</pre>
    <button id="btn-cerrar-tabla" type="button" class="btn">Cerrar</button>
  </dialog>

  <script src="./app.js" type="module"></script>
</body>
</html>
